<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVIESTOWN | Watchlist Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand-wrap">
                <span class="brand-mark">M</span>
                <h1 class="brand-name">MOVIESTOWN</h1>
            </div>
            <nav class="top-links">
                <button class="link-btn active" data-nav="home">Home</button>
                <button class="link-btn" data-nav="movies">Movies</button>
                <button class="link-btn" data-nav="series">Series</button>
            </nav>
            <div class="utility-bar">
                <div class="search-wrap">
                    <input id="searchInput" type="text" placeholder="Search title, genre, or actor">
                    <button id="clearBtn" aria-label="Clear search">✕</button>
                </div>
            </div>
        </header>

        <section class="hero" id="heroSection">
            <div class="hero-overlay"></div>
            <div class="hero-slider-controls">
                <button class="slide-btn slide-prev" id="slidePrev">‹</button>
                <button class="slide-btn slide-next" id="slideNext">›</button>
            </div>
            <div class="hero-slider-dots" id="slideDots"></div>
            <div class="hero-content">
                <p class="hero-kicker" id="heroKicker">Featured Tonight</p>
                <h2 id="heroTitle">Loading...</h2>
                <p id="heroMeta"></p>
                <p id="heroOverview"></p>
                <div class="hero-actions">
                    <button class="primary-btn" id="watchNowBtn">▶ Watch Now</button>
                    <button class="ghost-btn" id="heroDetailsBtn">More Info</button>
                </div>
            </div>
        </section>

        <main class="content">
            <div class="status-line" id="statusLine">Loading movie catalog...</div>
            <section class="filters">
                <div class="chip-row" id="genreChips"></div>
            </section>

            <section class="grid-section">
                <div class="section-head">
                    <h3 id="resultsTitle">Trending In MOVIESTOWN</h3>
                    <span id="resultCount"></span>
                </div>
                <div class="movie-grid" id="movieGrid"></div>
            </section>
        </main>

        <footer class="footer">
    <div class="footer-content">
        <div class="footer-left">
            <a href="https://github.com/alphonsbiju7" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.15 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.62.24 2.85.12 3.15.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                <span class="social-label">GitHub</span>
            </a>
        </div>

        <div class="footer-center">
            <p class="footer-text">Developed with ❤️ by Alphons Biju</p>
        </div>

        <div class="footer-right">
            <a href="https://www.linkedin.com/in/alphons-biju-05875232a/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                <span class="social-label">LinkedIn</span>
            </a>
        </div>
    </div>
</footer>
    </div>

    <div class="modal hidden" id="movieModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-card">
            <button class="modal-close" id="closeModalBtn" aria-label="Close">✕</button>
            <img id="modalPoster" alt="Movie poster">
            <div class="modal-body">
                <h3 id="modalTitle"></h3>
                <p id="modalMeta"></p>
                <p id="modalOverview"></p>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-label">Director</span>
                            <span class="detail-value" id="modalDirector"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Runtime</span>
                            <span class="detail-value" id="modalRuntime"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Country</span>
                            <span class="detail-value" id="modalCountry"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Awards</span>
                            <span class="detail-value" id="modalAwards"></span>
                        </div>
                    </div>
                <div class="modal-actions">
                    <button class="primary-btn" id="modalPlayBtn">▶ Play Trailer</button>
                    <button class="ghost-btn" id="modalSaveBtn">+ Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
